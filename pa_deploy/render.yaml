services:
  - type: web
    name: ekam-backend
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free
    region: oregon
    healthCheckPath: /api/health
    envVars:
      - key: PORT
        value: "8080"
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: DATABASE_PATH
        value: /data/ekam.db
      - key: DATA_DIR
        value: /data
      - key: UPLOAD_DIR
        value: /data/uploads
      - key: AUDIO_DIR
        value: /data/audio
      - key: MAX_FILE_SIZE_MB
        value: "50"
      - key: MAX_TEXT_LENGTH
        value: "50000"
      - key: CORS_ORIGINS
        value: "https://ekam.digital,https://www.ekam.digital"
      # Add these as secrets in Render dashboard:
      # - key: NVIDIA_API_KEY
      #   sync: false

disk:
  name: ekam-data
  mountPath: /data
  sizeGB: 1