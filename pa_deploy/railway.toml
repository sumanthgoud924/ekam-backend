# Ekam Backend - Railway Configuration
# Deploy: railway up

$schema = "https://railway.app/railway.schema.json"

build = { builder = "DOCKERFILE", dockerfilePath = "Dockerfile" }

deploy = {
  healthcheckPath = "/api/health",
  healthcheckTimeout = 30,
  restartPolicyType = "ON_FAILURE",
  restartPolicyMaxRetries = 3,
}

[env]
PORT = "8080"
PYTHONUNBUFFERED = "1"
DATA_DIR = "/app/data"
UPLOAD_DIR = "/app/data/uploads"
AUDIO_DIR = "/app/data/audio"
DATABASE_PATH = "/app/data/ekam.db"
MAX_FILE_SIZE_MB = "50"
MAX_TEXT_LENGTH = "50000"
CORS_ORIGINS = "https://ekam.digital,https://www.ekam.digital"

[volumes]
data = "/app/data"

[[services]]
name = "ekam-backend"

[services.ekam-backend]
healthcheckPath = "/api/health"
healthcheckTimeout = 30

[services.ekam-backend.resources]
memoryLimit = 512
cpuLimit = 0.5